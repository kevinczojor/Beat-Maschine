<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beat-Maschine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Beat-Maschine</h1>
        <p>Klicke ein Symbol an und ziehe es in die Quadrate!</p>
    </header>

    <main>
        <div class="grid-container">
            <div class="cell header">1</div>
            <div class="cell header">+</div>
            <div class="cell header">2</div>
            <div class="cell header">+</div>
            <div class="cell header">3</div>
            <div class="cell header">+</div>
            <div class="cell header">4</div>
            <div class="cell header">+</div>

            <div class="cell drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)" ondragenter="dragEnter(event)" ondragleave="dragLeave(event)" onclick="this.style.backgroundImage=''"></div>
            <div class="cell drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)" ondragenter="dragEnter(event)" ondragleave="dragLeave(event)" onclick="this.style.backgroundImage=''"></div>
            <div class="cell drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)" ondragenter="dragEnter(event)" ondragleave="dragLeave(event)" onclick="this.style.backgroundImage=''"></div>
            <div class="cell drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)" ondragenter="dragEnter(event)" ondragleave="dragLeave(event)" onclick="this.style.backgroundImage=''"></div>
            <div class="cell drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)" ondragenter="dragEnter(event)" ondragleave="dragLeave(event)" onclick="this.style.backgroundImage=''"></div>
            <div class="cell drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)" ondragenter="dragEnter(event)" ondragleave="dragLeave(event)" onclick="this.innerHTML=''"></div>
            <div class="cell drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)" ondragenter="dragEnter(event)" ondragleave="dragLeave(event)" onclick="this.innerHTML=''"></div>
            <div class="cell drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)" ondragenter="dragEnter(event)" ondragleave="dragLeave(event)" onclick="this.innerHTML=''"></div>
        </div>

        <div class="palette-container">
            <h3></h3>
            <div class="symbol-palette">
                <div class="drag-item" draggable="true" ondragstart="drag(event)" data-src="schnippen.png" style="background-image: url('schnippen.png');"></div>
                <div class="drag-item" draggable="true" ondragstart="drag(event)" data-src="trampeln.png" style="background-image: url('trampeln.png');"></div>
                <div class="drag-item" draggable="true" ondragstart="drag(event)" data-src="klatschen.png" style="background-image: url('klatschen.png');"></div>
                <div class="drag-item" draggable="true" ondragstart="drag(event)" data-src="hey.png" style="background-image: url('hey.png');"></div>
                <div class="drag-item" draggable="true" ondragstart="drag(event)" data-src="ho.png" style="background-image: url('ho.png');"></div>
                <div class="drag-item" draggable="true" ondragstart="drag(event)" data-src="yeah.png" style="background-image: url('yeah.png');"></div>
                <div class="drag-item" draggable="true" ondragstart="drag(event)" data-src="klopfen.png" style="background-image: url('klopfen.png');"></div>
            </div>
            <button class="clear-btn" onclick="clearAll()">Tabelle leeren</button>
        </div>

        <div class="controls-container">
            <button id="play-btn" class="control-btn" onclick="togglePlay()">Play</button>
            <button class="control-btn" onclick="stopSequencer()">Stop</button>
            <div class="tempo-controls">
                <label>Tempo: <span id="bpm-value">80</span> BPM</label>
                <input type="range" id="bpm" min="40" max="120" value="120" oninput="updateBPM(this.value)">
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
